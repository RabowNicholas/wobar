name: Sync vault to Google Drive

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Upload vault files to Google Drive as Google Docs
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python3 << 'EOF'
          import os
          import glob
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Auth using OAuth2 credentials
          creds = Credentials(
              token=None,
              refresh_token=os.environ["GDRIVE_REFRESH_TOKEN"],
              client_id=os.environ["GDRIVE_CLIENT_ID"],
              client_secret=os.environ["GDRIVE_CLIENT_SECRET"],
              token_uri="https://oauth2.googleapis.com/token"
          )
          service = build("drive", "v3", credentials=creds)
          folder_id = os.environ["GDRIVE_FOLDER_ID"]

          # Find all .md files in the vault
          md_files = list(set(glob.glob("**/*.md", recursive=True) + glob.glob("*.md")))

          # Get existing Google Docs in the Drive folder
          results = service.files().list(
              q=f"'{folder_id}' in parents and trashed=false and mimeType='application/vnd.google-apps.document'",
              fields="files(id, name)"
          ).execute()
          existing = {f["name"]: f["id"] for f in results.get("files", [])}

          for filepath in md_files:
              filename = os.path.basename(filepath).replace(".md", "")
              media = MediaFileUpload(filepath, mimetype="text/plain")

              if filename in existing:
                  # Update existing Google Doc content
                  service.files().update(
                      fileId=existing[filename],
                      media_body=media
                  ).execute()
                  print(f"Updated: {filename}")
              else:
                  # Create new Google Doc (Drive auto-converts plain text to Google Doc)
                  metadata = {
                      "name": filename,
                      "parents": [folder_id],
                      "mimeType": "application/vnd.google-apps.document"
                  }
                  service.files().create(
                      body=metadata,
                      media_body=media
                  ).execute()
                  print(f"Created: {filename}")

          print("Sync complete.")
          EOF
