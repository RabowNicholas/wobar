<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  }

    letter-spacing: 8px;
    color: #7B3FA1;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 32px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    text-transform: uppercase;
  }

  /* Carousel selector */
  .selector {
    display: flex;
    gap: 2px;
    margin-bottom: 28px;
    border: 1px solid rgba(123,63,161,0.4);
    padding: 3px;
    border-radius: 2px;
  }
  .selector button {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.35);
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
    text-transform: uppercase;
  }
  .selector button.active {
    background: #7B3FA1;
    color: #fff;
  }
  .selector button:hover:not(.active) {
    color: rgba(255,255,255,0.7);
  }

  /* Carousel label */
  .carousel-label {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.25);
    margin-bottom: 20px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    text-transform: uppercase;
    height: 14px;
    transition: opacity 0.3s;
  }

  /* Stage */
  .stage {
    position: relative;
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Slide container */
  .slide-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    box-shadow: 0 0 60px rgba(123,63,161,0.15);
  }

  .slide-track {
    display: flex;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .slide {
    min-width: 100%;
    display: block;
  }

  .slide svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Nav buttons */
  .nav-btn {
    background: rgba(123,63,161,0.2);
    border: 1px solid rgba(123,63,161,0.4);
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 16px;
  }
  .nav-btn:hover { background: rgba(123,63,161,0.5); border-color: #7B3FA1; }
  .nav-btn:disabled { opacity: 0.18; cursor: default; }

  /* Dots */
  .dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.active {
    background: #B34E8F;
    width: 18px;
    border-radius: 3px;
  }
  .dot:hover:not(.active) { background: rgba(255,255,255,0.4); }

  /* Slide counter */
  .counter {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.25);
    margin-top: 14px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
  }

  /* Keyboard hint */
  .hint {
    margin-top: 36px;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.15);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    text-transform: uppercase;
  }
</style>

<div class="dots" id="dots"></div>
<div class="counter" id="counter"></div>
<div class="hint">← → arrow keys to navigate · click tabs to switch carousels</div>

<script>
  const carousels = [
    {
      label: "THE PORTAL / THE THRESHOLD",
      start: 0,
      count: 4
    },
    {
      label: "FINAL INVITE",
      start: 4,
      count: 4
    }
  ];

  let activeCarousel = 0;
  let currentSlide = 0; // index within active carousel
  const track = document.getElementById('track');
  const allSlides = document.querySelectorAll('.slide');
  const dotsEl = document.getElementById('dots');
  const counterEl = document.getElementById('counter');
  const labelEl = document.getElementById('carousel-label');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  function buildDots() {
    dotsEl.innerHTML = '';
    const c = carousels[activeCarousel];
    for (let i = 0; i < c.count; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === currentSlide ? ' active' : '');
      d.onclick = () => goTo(i);
      dotsEl.appendChild(d);
    }
  }

  function updateCounter() {
    const c = carousels[activeCarousel];
    counterEl.textContent = `${String(currentSlide + 1).padStart(2,'0')} / ${String(c.count).padStart(2,'0')}`;
  }

  function updateNav() {
    prevBtn.disabled = currentSlide === 0;
    nextBtn.disabled = currentSlide === carousels[activeCarousel].count - 1;
  }

  function render() {
    const c = carousels[activeCarousel];
    const globalIndex = c.start + currentSlide;
    const slideWidth = allSlides[0].parentElement.parentElement.offsetWidth;
    track.style.transform = `translateX(-${globalIndex * slideWidth}px)`;
    buildDots();
    updateCounter();
    updateNav();
    labelEl.textContent = c.label;
  }

  function goTo(i) {
    currentSlide = i;
    render();
  }

  function prev() {
    if (currentSlide > 0) { currentSlide--; render(); }
  }

  function next() {
    const c = carousels[activeCarousel];
    if (currentSlide < c.count - 1) { currentSlide++; render(); }
  }

  function switchCarousel(idx) {
    activeCarousel = idx;
    currentSlide = 0;
    document.querySelectorAll('.selector button').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
    render();
  }

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === '1') switchCarousel(0);
    if (e.key === '2') switchCarousel(1);
  });

  // Touch/swipe
  let touchStartX = 0;
  track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  track.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { diff > 0 ? next() : prev(); }
  });

  // Init
  render();
</script>
</body>
